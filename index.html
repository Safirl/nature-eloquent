<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Petit Pois</title>
    </head>
    <body>
        <!-- Book canvas -->
        <div id="book-interface">
            <div class="book-tabs">
                <div class="book-tab">
                    <img
                        class="book-tab-image"
                        src="/src/books/books2/validate.svg"
                        alt=""
                    />
                </div>
            </div>
            <div id="book-drawing-interface" class="book-panel">
                <!-- Page gauche du carnet -->
                <div class="book-page book-page-left">
                    <img
                        class="sticker"
                        src="/src/books/books2/champignon.png"
                        alt=""
                    />
                </div>
                <!-- Book spine -->
                <div class="book-spine"></div>
                <!-- Page droite du carnet -->
                <div class="book-page book-page-right">
                    <p class="interactable-object-title">CHAMPIGNON</p>
                </div>
            </div>
        </div>

        <canvas id="three"></canvas>
        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
